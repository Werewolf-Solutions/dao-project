[profile.default]
src = "src"
out = "out"
libs = ["lib"]

fs_permissions = [{ access = "write", path = "./"}]

# Enable optimizer for contract size reduction and stack depth issues
optimizer = true
optimizer_runs = 200

# As a last resort set this to true
via_ir = true

# fix the compiler version to standardize testing
solc_version = "0.8.28"

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
